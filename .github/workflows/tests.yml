name: Tests

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  # Installs the working tree (PRs / pre-release). On GitHub Release, installs the tag.
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install loanpy
        run: |
          pip install --upgrade pip
          if [ "${{ github.event_name }}" = "release" ]; then
            pip install "loanpy @ git+https://github.com/loanwordbank/loanpy.git@${{ github.event.release.tag_name }}"
          else
            pip install -e ".[test]"
          fi

      - name: Run tests with coverage
        run: |
          pytest tests/ --cov=loanpy --cov-report=term-missing --cov-report=xml

      - name: Upload coverage (Python 3.12 only)
        if: matrix.python-version == '3.12'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml

  # Simulates end-user install from the latest commit on the default branch.
  test-from-github-main:
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install loanpy from latest main on GitHub
        run: |
          pip install --upgrade pip
          pip install "loanpy @ git+https://github.com/loanwordbank/loanpy.git@main"

      - name: Run tests against GitHub install
        run: |
          pip install pytest pytest-cov
          pytest tests/ --cov=loanpy -q
